<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>BRICK BREAKER — Arkanoid Style</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="wrapper">
    <div id="stage">
      <canvas id="game" width="448" height="620"></canvas>
      <button id="pauseBtn" type="button" aria-label="ポーズ">❚❚</button>
    </div>
    <div id="touchpad" aria-label="バー操作エリア">
      <span>◀&nbsp;&nbsp;ここをスライドしてバーを操作&nbsp;／&nbsp;タップで発射&nbsp;&nbsp;▶</span>
    </div>
    <p id="hint">
      操作: マウス / ←→キー ・ 発射&レーザー: クリック / スペース ・ ポーズ: P
    </p>
  </div>
  <script src="js/game.js"></script>
</body>
</html>
